stages:
  - name: Build
    steps:
      - runScriptConfig:
          image: alpine/git
          shellScript: git submodule init
      - runScriptConfig:
          image: maven:3.6-adoptopenjdk-11
          shellScript: mvn package -DskipTests
  - name: Build Docker
    steps:
      - publishImageConfig:
          dockerfilePath: ./Dockerfile
          buildContext: .
          tag: docker.dev.folio.org/mod-inventory-storage:core-functional-latest
          pushRemote: true
          registry: docker.dev.folio.org
timeout: 60
notification: {}
