stages:
  - name: Build
    steps:
      - runScriptConfig:
          image: adoptopenjdk/maven-openjdk11
          shellScript: mvn clean install -DskipTests
  - name: Build Docker
    steps:
      - publishImageConfig:
          dockerfilePath: ./Dockerfile
          buildContext: .
          tag: docker.dev.folio.org/mod-inventory-storage:core-functional-latest
          pushRemote: true
          registry: docker.dev.folio.org
timeout: 60
notification: {}
